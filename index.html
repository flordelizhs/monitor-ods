<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>WarRoom Seguridad TI - INEI</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    transition:0.5s;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:4px solid #2563eb;
}

.header h1{
    margin:0;
    font-size:45px;
}

.sub{
    margin-top:10px;
    font-size:20px;
    color:#cbd5e1;
}

.grid{

    display:grid;
    grid-template-columns:repeat(3, 250px);
    justify-content:center;
    gap:40px;
    margin-top:80px;

}

.hex{

    width:250px;
    height:220px;
    background:#1e293b;
    clip-path: polygon(
      25% 6.7%,
      75% 6.7%,
      100% 50%,
      75% 93.3%,
      25% 93.3%,
      0% 50%
    );

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    border:4px solid #22c55e;

    transition:0.5s;
}

.nombre{
    font-size:38px;
    font-weight:bold;
}

.estado{
    margin-top:15px;
    font-size:22px;
}

.ok{
    border-color:#22c55e;
    color:#22c55e;
}

.down{
    border-color:#ef4444;
    color:#ef4444;
    animation: blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.3;
    }
}

.footer{
    margin-top:80px;
    background:#111827;
    text-align:center;
    padding:15px;
    font-size:20px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">

<h1>WarRoom Seguridad TI - INEI</h1>

<div class="sub">
Monitor de Sistemas Críticos
</div>

</div>

<div class="grid" id="grid"></div>

<div class="footer">
Monitoreo de sistemas criticos
</div>

<audio id="alarma" loop>
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("TU_PUBLIC_KEY");

const sistemas = [

{
nombre:"ODS",
url:"https://ods.inei.gob.pe/"
},

{
nombre:"OWA",
url:"https://economicas2.inei.gob.pe/owa/"
},

{
nombre:"SGD",
url:"https://sgd.inei.gob.pe/sgd/login.do"
},

{
nombre:"UNETE",
url:"https://aplications.inei.gob.pe/WebConsecucion/"
},

{
nombre:"CPV25",
url:"https://censos2025.inei.gob.pe/"
}

];

let alertaEnviada = {};

const grid = document.getElementById("grid");

function crearPanel(){

grid.innerHTML = "";

sistemas.forEach((sistema,index)=>{

grid.innerHTML += `

<div class="hex ok" id="panel-${index}">

<div class="nombre">
${sistema.nombre}
</div>

<div class="estado" id="estado-${index}">
VALIDANDO
</div>

</div>

`;

});

}

async function verificar(){

let hayCaidos = false;

for(let i=0;i<sistemas.length;i++){

const sistema = sistemas[i];

const panel = document.getElementById(`panel-${i}`);

const estado = document.getElementById(`estado-${i}`);

try{

await fetch(sistema.url, {
mode:'no-cors'
});

panel.className = "hex ok";

estado.innerHTML = "OPERATIVO";

alertaEnviada[sistema.nombre] = false;

}
catch(error){

hayCaidos = true;

panel.className = "hex down";

estado.innerHTML = "CAÍDO";

if(!alertaEnviada[sistema.nombre]){

enviarCorreo(sistema.nombre);

alertaEnviada[sistema.nombre] = true;

}

}

}

if(hayCaidos){

document.body.style.background="#3f0000";

document.getElementById("alarma").play();

}
else{

document.body.style.background="#0f172a";

document.getElementById("alarma").pause();

}

}

function enviarCorreo(sistema){

emailjs.send(
"TU_SERVICE_ID",
"TU_TEMPLATE_ID",
{
sistema:sistema,
mensaje:`El sistema ${sistema} se encuentra caído`
}
);

}

crearPanel();

verificar();

setInterval(verificar,5000);

</script>

</body>

</html>
