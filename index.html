<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>WarRoom Seguridad TI</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    transition:0.5s;
    overflow-x:hidden;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:4px solid #2563eb;
}

.header h1{
    margin:0;
    font-size:50px;
    color:#ffffff;
}

.sub{
    margin-top:10px;
    font-size:22px;
    color:#cbd5e1;
}

.grid{

    display:grid;

    grid-template-columns:repeat(3, 260px);

    justify-content:center;

    gap:45px;

    margin-top:70px;

}

.hex{

    width:260px;
    height:230px;

    background:#1e293b;

    clip-path: polygon(
      25% 6.7%,
      75% 6.7%,
      100% 50%,
      75% 93.3%,
      25% 93.3%,
      0% 50%
    );

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    border:5px solid #22c55e;

    transition:0.5s;

    box-shadow:0 0 25px rgba(0,0,0,0.4);

}

.nombre{

    font-size:42px;

    font-weight:bold;

    letter-spacing:2px;

}

.estado{

    margin-top:15px;

    font-size:24px;

    font-weight:bold;

}

.ok{

    border-color:#22c55e;

    color:#22c55e;

}

.down{

    border-color:#ff0000;

    color:#ff0000;

    animation: blink 1s infinite;

    box-shadow:0 0 35px #ff0000;

}

@keyframes blink{

    50%{
        opacity:0.3;
    }

}

.footer{

    margin-top:80px;

    background:#111827;

    text-align:center;

    padding:18px;

    font-size:22px;

    color:#94a3b8;

}

.alertaTexto{

    position:fixed;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    font-size:100px;

    font-weight:bold;

    color:#ff0000;

    animation: blink 1s infinite;

    z-index:9999;

    display:none;

    text-shadow:0 0 30px #ff0000;

}

</style>

</head>

<body>

<div class="header">

<h1>WarRoom Seguridad TI</h1>

<div class="sub">
Monitoreo de Sistemas Críticos
</div>

</div>

<div class="grid" id="grid"></div>

<div class="footer">
Monitoreo de Lanzamiento ODS: 06 y 07 de Mayo 2026
</div>

<div class="alertaTexto" id="alertaTexto">
⚠ ALERTA CRÍTICA ⚠
</div>

<script>

const sistemas = [

{
nombre:"ODS",
url:"https://ods.inei.gob.pe"
},

{
nombre:"OWA",
url:"https://economicas2.inei.gob.pe/owa"
},

{
nombre:"SGD",
url:"https://sgd.inei.gob.pe"
},

{
nombre:"UNETE",
url:"https://aplications.inei.gob.pe/WebConsecucion"
},

{
nombre:"CPV25",
url:"https://censos2025.inei.gob.pe"
}

];

const grid = document.getElementById("grid");

let hablando = false;

function hablarAlerta(nombreSistema){

if(hablando) return;

hablando = true;

speechSynthesis.cancel();

const mensaje = new SpeechSynthesisUtterance();

mensaje.text =
"Alerta crítica. El sistema " +
nombreSistema +
" se encuentra caído. Revisar inmediatamente.";

mensaje.lang = "es-ES";

mensaje.volume = 1;

mensaje.rate = 0.85;

mensaje.pitch = 1;

const voces = speechSynthesis.getVoices();

const voz = voces.find(v =>
v.lang.includes("es")
);

if(voz){

mensaje.voice = voz;

}

mensaje.onend = () => {

hablando = false;

};

speechSynthesis.speak(mensaje);

}

function crearPanel(){

grid.innerHTML = "";

sistemas.forEach((sistema,index)=>{

grid.innerHTML += `

<div class="hex ok" id="panel-${index}">

<div class="nombre">
${sistema.nombre}
</div>

<div class="estado" id="estado-${index}">
VALIDANDO
</div>

</div>

`;

});

}

async function verificarSistema(url){

return new Promise((resolve,reject)=>{

const img = new Image();

img.onload = () => resolve(true);

img.onerror = () => reject(false);

img.src = url + "/favicon.ico?cache=" + new Date().getTime();

setTimeout(() => reject(false), 4000);

});

}

async function verificar(){

let hayCaidos = false;

let sistemaCaido = "";

for(let i=0;i<sistemas.length;i++){

const sistema = sistemas[i];

const panel = document.getElementById(`panel-${i}`);

const estado = document.getElementById(`estado-${i}`);

try{

await verificarSistema(sistema.url);

panel.className = "hex ok";

estado.innerHTML = "OPERATIVO";

}
catch(error){

hayCaidos = true;

sistemaCaido = sistema.nombre;

panel.className = "hex down";

estado.innerHTML = "CAÍDO";

}

}

if(hayCaidos){

document.body.style.background="#3f0000";

document.getElementById("alertaTexto").style.display="block";

hablarAlerta(sistemaCaido);

}
else{

document.body.style.background="#0f172a";

document.getElementById("alertaTexto").style.display="none";

}

}

crearPanel();

verificar();

setInterval(verificar,5000);

</script>

</body>

</html>
