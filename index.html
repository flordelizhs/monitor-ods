<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>WarRoom Seguridad TI</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    transition:0.5s;
    overflow-x:hidden;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:4px solid #2563eb;
}

.header h1{
    margin:0;
    font-size:50px;
}

.sub{
    margin-top:10px;
    font-size:22px;
    color:#cbd5e1;
}

.grid{

    display:grid;

    grid-template-columns:repeat(auto-fit, minmax(260px, 260px));

    justify-content:center;

    gap:40px;

    margin-top:70px;

    padding:20px;

}

.hex{

    width:260px;
    height:230px;

    background:#1e293b;

    clip-path: polygon(
      25% 6.7%,
      75% 6.7%,
      100% 50%,
      75% 93.3%,
      25% 93.3%,
      0% 50%
    );

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    border:5px solid #64748b;

    transition:0.4s;

    box-shadow:0 0 25px rgba(0,0,0,0.4);

    cursor:pointer;

    text-decoration:none;

}

.hex:hover{

    transform:scale(1.05);

    box-shadow:0 0 35px #2563eb;

}

.nombre{

    font-size:34px;

    font-weight:bold;

    letter-spacing:2px;

    text-align:center;

}

.estado{

    margin-top:15px;

    font-size:22px;

    font-weight:bold;

}

.link{

    margin-top:15px;

    font-size:14px;

    color:#cbd5e1;

    text-align:center;

    width:80%;

    word-break:break-word;

}

.ok{

    border-color:#22c55e;

    color:#22c55e;

    box-shadow:0 0 30px rgba(34,197,94,0.5);

}

.down{

    border-color:#ff0000;

    color:#ff0000;

    animation: blink 1s infinite;

    box-shadow:0 0 35px #ff0000;

}

.validando{

    border-color:#facc15;

    color:#facc15;

}

@keyframes blink{

    50%{
        opacity:0.4;
    }

}

.footer{

    margin-top:60px;

    background:#111827;

    text-align:center;

    padding:18px;

    font-size:22px;

    color:#94a3b8;

}

.alertaTexto{

    position:fixed;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    font-size:90px;

    font-weight:bold;

    color:#ff0000;

    animation: blink 1s infinite;

    z-index:9999;

    display:none;

    text-shadow:0 0 30px #ff0000;

    text-align:center;

}

</style>

</head>

<body>

<div class="header">

<h1>WarRoom Seguridad TI</h1>

<div class="sub">
Monitoreo de Sistemas Críticos
</div>

</div>

<div class="grid" id="grid"></div>

<div class="footer">
SEGURIDAD INFORMATICA - OTIN/INEI - 2026
</div>

<div class="alertaTexto" id="alertaTexto">
⚠ ALERTA CRÍTICA ⚠
</div>

<script>

const sistemas = [

{
nombre:"ODS",
url:"https://ods.inei.gob.pe"
},

{
nombre:"OWA",
url:"https://economicas2.inei.gob.pe"
},

{
nombre:"SGD",
url:"https://sgd.inei.gob.pe"
},

{
nombre:"UNETE",
url:"https://aplications.inei.gob.pe"
},

{
nombre:"CPV25",
url:"https://censos2025.inei.gob.pe"
},

{
nombre:"RENAMU",
url:"https://renamu.inei.gob.pe/2026/#/login/mon"
},

{
nombre:"EEA",
url:"https://portaleea.inei.gob.pe/"
},

{
nombre:"POS/LAN",
url:"https://postcensalcpv.inei.gob.pe/apareamiento-de-datos-epc-frontend/login/login"
},

{
nombre:"CON/LAN",
url:"https://consistenciacpv2025.inei.gob.pe/autenticacion/login"
}

];

const grid = document.getElementById("grid");

let hablando = false;

function hablarAlerta(nombreSistema){

if(hablando) return;

hablando = true;

speechSynthesis.cancel();

const mensaje = new SpeechSynthesisUtterance();

mensaje.text =
"Alerta crítica. El sistema " +
nombreSistema +
" presenta problemas de conectividad.";

mensaje.lang = "es-ES";

mensaje.volume = 1;

mensaje.rate = 0.9;

mensaje.pitch = 1;

const voces = speechSynthesis.getVoices();

const voz = voces.find(v =>
v.lang.includes("es")
);

if(voz){

mensaje.voice = voz;

}

mensaje.onend = () => {

hablando = false;

};

speechSynthesis.speak(mensaje);

}

function crearPanel(){

grid.innerHTML = "";

sistemas.forEach((sistema,index)=>{

grid.innerHTML += `

<a
href="${sistema.url}"
target="_blank"
class="hex validando"
id="panel-${index}"
>

<div class="nombre">
${sistema.nombre}
</div>

<div class="estado" id="estado-${index}">
VALIDANDO
</div>

<div class="link">
ABRIR SISTEMA
</div>

</a>

`;

});

}

async function verificarSistema(url){

return new Promise((resolve,reject)=>{

const controller = new AbortController();

const timeout = setTimeout(() => {

controller.abort();

reject(false);

}, 5000);

fetch(url, {

method:"HEAD",

mode:"no-cors",

cache:"no-store",

signal:controller.signal

})
.then(() => {

clearTimeout(timeout);

resolve(true);

})
.catch(() => {

clearTimeout(timeout);

reject(false);

});

});

}

async function verificar(){

let hayCaidos = false;

let sistemasCaidos = [];

for(let i=0;i<sistemas.length;i++){

const sistema = sistemas[i];

const panel = document.getElementById(`panel-${i}`);

const estado = document.getElementById(`estado-${i}`);

try{

await verificarSistema(sistema.url);

panel.className = "hex ok";

estado.innerHTML = "OPERATIVO";

}
catch(error){

hayCaidos = true;

sistemasCaidos.push(sistema.nombre);

panel.className = "hex down";

estado.innerHTML = "SIN RESPUESTA";

}

}

if(hayCaidos){

document.body.style.background="#3f0000";

document.getElementById("alertaTexto").style.display="block";

hablarAlerta(sistemasCaidos.join(", "));

}
else{

document.body.style.background="#0f172a";

document.getElementById("alertaTexto").style.display="none";

}

}

crearPanel();

setTimeout(() => {

verificar();

setInterval(verificar,5000);

}, 2000);

</script>

</body>

</html>
