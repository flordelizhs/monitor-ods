<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Sistema ODS - INEI</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.header{
    background:#111827;
    padding:25px;
    text-align:center;
    border-bottom:4px solid #2563eb;
}

.header h1{
    margin:0;
    font-size:48px;
}

.sub{
    margin-top:10px;
    font-size:22px;
    color:#cbd5e1;
}

.panel{
    display:flex;
    justify-content:center;
    align-items:center;
    height:70vh;
    flex-direction:column;
}

#estado{
    font-size:120px;
    font-weight:bold;
}

.ok{
    color:#22c55e;
}

.down{
    color:#ef4444;
    animation: blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.3;
    }
}

#detalle{
    margin-top:40px;
    font-size:35px;
}

.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    text-align:center;
    padding:15px;
    font-size:22px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
    <h1>SISTEMA ODS</h1>
    <div class="sub">
        Instituto Nacional de Estadística e Informática - INEI
    </div>
</div>

<div class="panel">

    <div id="estado" class="ok">
        OPERATIVO
    </div>

    <div id="detalle">
        Validando disponibilidad...
    </div>

</div>

<div class="footer">
    Monitoreo Externo Internet | Actualización cada 5 segundos
</div>

<audio id="alarma" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const URL = "https://ods.inei.gob.pe/";

async function verificar(){

    try{

        await fetch(URL, {
            mode:'no-cors'
        });

        document.getElementById("estado").innerHTML = "OPERATIVO";
        document.getElementById("estado").className = "ok";

        document.getElementById("detalle").innerHTML =
        "Última validación exitosa: "
        + new Date().toLocaleTimeString();

        document.getElementById("alarma").pause();

        document.body.style.background="#0f172a";

    }
    catch(error){

        document.getElementById("estado").innerHTML = "SISTEMA CAÍDO";
        document.getElementById("estado").className = "down";

        document.getElementById("detalle").innerHTML =
        "Sin respuesta detectada: "
        + new Date().toLocaleTimeString();

        document.getElementById("alarma").play();

        document.body.style.background="#3f0000";

    }

}

setInterval(verificar, 5000);

verificar();

</script>

</body>

</html>
